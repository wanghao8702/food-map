<!DOCTYPE html><html><head><meta charset="utf-8"><title>tests</title></head>
<body><pre id="out"></pre>
<script type="module">
import { project } from './src/projection.js';
import { matchDishes } from './src/search.js';
const out = document.getElementById('out');
let pass = 0, fail = 0;
function eq(name, a, b, tol=0.5){
  if (Math.abs(a-b) <= tol){ pass++; out.textContent += `PASS ${name}\n`; }
  else { fail++; out.textContent += `FAIL ${name}: got ${a}, want ${b}\n`; }
}
// 世界图参数：经度[-180,180]→x[0,1000]，纬度[85,-60]→y[0,500]
const W = { lngMin:-180, lngMax:180, latTop:85, latBottom:-60, width:1000, height:500 };
let p = project(0, 12.5, W);          // 经度0→中点x=500；纬度12.5(范围中点)→y=250
eq('world-center-x', p.x, 500);
eq('world-center-y', p.y, 250);
p = project(180, 85, W);              // 右上角
eq('world-topright-x', p.x, 1000);
eq('world-topright-y', p.y, 0);

// 搜索过滤纯函数 matchDishes(dishes, query, season)
const sample=[
  {id:'a',name:'太湖大闸蟹',region:'江苏·太湖',season:1,episode:1},
  {id:'b',name:'土黄油',region:'江苏·苏州',season:1,episode:1},
  {id:'c',name:'西班牙海鲜饭',region:'西班牙',season:4,episode:2},
];
eq('search-by-name', matchDishes(sample,'大闸蟹',null).length, 1);
eq('search-by-region', matchDishes(sample,'江苏',null).length, 2);
eq('search-season-filter', matchDishes(sample,'',1).length, 2);
eq('search-empty-all', matchDishes(sample,'',null).length, 3);
eq('search-no-match', matchDishes(sample,'zzz',null).length, 0);
eq('search-query-and-season', matchDishes(sample,'海鲜',4).length, 1);

out.textContent += (fail===0)?`\nALL PASS (${pass})`:`\n${fail} FAILED`;
</script></body></html>
